id: pusheen-wled
display_name: "WLEDkitty"
product_line: pusheen
model: "Pusheen"
mcu: esp8266
version: "0.15.0"
recommended: true
description: "WLEDkitty — WLED tuned for Retia hardware, on the ESP8266 Pusheen cat lamp. Boots straight into a Pride rainbow across the 4 onboard LEDs, with the front button for on/off, brightness, and palettes."
program_url: https://github.com/wled/WLED
quickstart:
  - "Flash this firmware; the Pusheen reboots into a Pride rainbow on its 4 LEDs (D1 / GPIO5)."
  - "Button (D3 / GPIO0): tap = on/off, hold = brightness, double-tap = next palette."
  - "Join the 'WLED-AP' WiFi network (password 'wled1234') and open http://4.3.2.1 to set up WiFi and pick effects."
provenance:
  binary_source: release
  release:
    repo: RetiaLLC/WLEDkitty
    tag: wledkitty-v0.15.0
    asset_pattern: "wledkitty-pusheen.bin"
    expected_sha256: "e42dfddffeced1988fd1af0671e8879e4ecad10cdc42911d8cda9689e382350f"
