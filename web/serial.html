<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Serial Monitor — scriptkitty.sh</title>
  <meta name="description" content="A colorized browser serial monitor for the Nugget & Nibble line. Connect over Web Serial, watch output, send commands, save the whole session." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%90%B1%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="vendor/xterm/xterm.css" />
  <link rel="stylesheet" href="styles.css" />
  <script src="vendor/xterm/xterm.js"></script>
  <script src="vendor/xterm/addon-fit.js"></script>
  <script src="vendor/xterm/addon-search.js"></script>
</head>
<body class="serial-page">
  <header class="site-header compact">
    <div class="wrap">
      <div class="topbar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">🐱</span>
          <span class="brand-name">scriptkitty<span class="tld">.sh</span></span>
        </div>
        <nav class="nav">
          <a href="index.html">Flash</a>
          <a href="serial.html" class="active">Serial Monitor</a>
          <a href="https://retia.io" target="_blank" rel="noopener">Shop ↗</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="term-main">
    <div id="unsupported" class="banner banner-warn" hidden>
      <strong>This browser can't talk to serial devices.</strong>
      The serial monitor needs Web Serial — open this page in <b>Chrome</b>, <b>Edge</b>, or another Chromium browser on desktop.
    </div>

    <div class="term-toolbar">
      <button id="connect" class="btn">Connect</button>
      <label class="ctl">Baud
        <select id="baud">
          <option>115200</option><option>921600</option><option>460800</option>
          <option>230400</option><option>74880</option><option>9600</option>
        </select>
      </label>
      <label class="ctl">End
        <select id="lineEnding">
          <option value="\n">NL</option><option value="\r\n">CR+NL</option>
          <option value="\r">CR</option><option value="">None</option>
        </select>
      </label>
      <label class="ctl ctl-check"><input type="checkbox" id="echo" checked /> Echo</label>
      <label class="ctl ctl-check"><input type="checkbox" id="timestamps" /> Timestamps</label>
      <button id="reset" class="btn secondary" disabled title="Reboot the board (DTR/RTS pulse)">Reset</button>
      <button id="clear" class="btn secondary">Clear</button>
      <button id="save" class="btn secondary" title="Download the entire session (never truncated)">Save log</button>
      <input id="search" class="term-search" type="search" placeholder="Search… (Enter / Shift+Enter)" />
      <span id="status" class="term-status">Disconnected</span>
    </div>

    <div id="terminal" class="xterm-host"></div>

    <form id="sendForm" class="term-input" autocomplete="off">
      <input id="input" type="text" placeholder="Type a command, press Enter (↑/↓ for history)…" aria-label="Send to device" disabled />
      <button id="send" class="btn" type="submit" disabled>Send</button>
    </form>
  </main>

  <script src="serial.js"></script>
</body>
</html>
